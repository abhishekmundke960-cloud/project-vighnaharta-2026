<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganpati Puzzle</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#fff8e7;
text-align:center;
}

h1{
color:#e65100;
margin-top:20px;
}

#puzzle{
width:300px;
height:300px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:2px;
}

.tile{
border:1px solid #fff;
background-image:url('ganpati.jpg');
background-size:300px 300px;
cursor:pointer;
  height:100px;
}

.empty{
background:none;
background:#ddd;
}

button{
padding:12px 20px;
font-size:18px;
background:#ff6b00;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:15px;
}
</style>
</head>

<body>

<h1>🧩 Ganpati Puzzle</h1>

<div id="puzzle"></div>

<button onclick="shuffle()">🔀 Shuffle</button>

<script>
  const puzzle = document.getElementById("puzzle");

let tiles = [0,1,2,3,4,5,6,7,8];

function draw(){
    puzzle.innerHTML="";

    tiles.forEach((value,index)=>{
        const tile=document.createElement("div");

        if(value===8){
            tile.className="tile empty";
        }else{
            tile.className="tile";
            tile.style.backgroundPosition=`${-(value%3)*100}px ${-Math.floor(value/3)*100}px`;
        }

        tile.onclick=()=>move(index);

        puzzle.appendChild(tile);
    });
}

function move(index){
    const empty=tiles.indexOf(8);

    const valid=[
        empty-1,
        empty+1,
        empty-3,
        empty+3
    ];

    if(valid.includes(index)){
        [tiles[index],tiles[empty]]=[tiles[empty],tiles[index]];
        draw();

        if(isSolved()){
            setTimeout(()=>{
                alert("🎉 Ganpati Bappa Morya! Puzzle Completed!");
            },100);
        }
    }
}

function shuffle(){
    for(let i=0;i<100;i++){
        const empty=tiles.indexOf(8);

        const moves=[empty-1,empty+1,empty-3,empty+3]
        .filter(i=>i>=0 && i<9);

        const random=moves[Math.floor(Math.random()*moves.length)];

        [tiles[random],tiles[empty]]=[tiles[empty],tiles[random]];
    }

    draw();
}

function isSolved(){
    return tiles.every((v,i)=>v===i);
}

shuffle();
</script>

</body>
</html>
