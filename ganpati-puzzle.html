<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganpati Puzzle</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#fff8e7;
text-align:center;
}

h1{
color:#e65100;
margin-top:20px;
}

#puzzle{
width:300px;
height:300px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:2px;
}

.tile{
width:100px;
height:100px;
border:1px solid #fff;
background-image:url('ganpati.jpg.png');
background-size:300px 300px;
background-repeat:no-repeat;
cursor:pointer;
}

.empty{
background:none;
background:#ddd;
}

button{
padding:12px 20px;
font-size:18px;
background:#ff6b00;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:15px;
}
</style>
</head>

<body>

<h1>🧩 Ganpati Puzzle</h1>
<h2>⏱️ Time: <span id="timer">0</span> sec</h2>
<div id="puzzle"></div>

<button onclick="shuffle()">🔀 Shuffle</button>
<h2>🏆 Leaderboard</h2>

<div id="leaderboard">
    <p>अजून कोणी खेळलेले नाही.</p>
</div>
<script>
  const puzzle = document.getElementById("puzzle");
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
let tiles = [0,1,2,3,4,5,6,7,8];
let seconds = 0;
let timer;
function draw(){
    puzzle.innerHTML="";

    tiles.forEach((value,index)=>{
        const tile=document.createElement("div");

        if(value===8){
            tile.className="tile empty";
        }else{
            tile.className="tile";
            tile.style.backgroundPosition=`${-(value%3)*100}px ${-Math.floor(value/3)*100}px`;
        }

        tile.onclick=()=>move(index);

        puzzle.appendChild(tile);
    });
}

function move(index){
    const empty=tiles.indexOf(8);

    const valid=[
        empty-1,
        empty+1,
        empty-3,
        empty+3
    ];

    if(valid.includes(index)){
        [tiles[index],tiles[empty]]=[tiles[empty],tiles[index]];
        draw();

        if(isSolved()){
            setTimeout(()=>{
            let name = prompt("तुझे नाव टाका", "Abhishek");

if(name == null || name.trim() == ""){
    name = "Guest";
}

leaderboard.push({
    name:name,
    score:100
});
leaderboard.sort((a,b)=>b.score-a.score);

leaderboard = leaderboard.slice(0,10);
localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
clearInterval(timer);
showLeaderboard();
                alert("🎉 Ganpati Bappa Morya! Puzzle Completed!");
            },100);
        }
    }
}

function shuffle(){

    clearInterval(timer);

    seconds = 0;
    document.getElementById("timer").innerText = seconds;

    timer = setInterval(() => {
        seconds++;
        document.getElementById("timer").innerText = seconds;
    },1000);

    for(let i=0;i<100;i++){

        const empty=tiles.indexOf(8);

        const moves=[empty-1,empty+1,empty-3,empty+3]
        .filter(i=>i>=0 && i<9);

        const random=moves[Math.floor(Math.random()*moves.length)];

        [tiles[random],tiles[empty]]=[tiles[empty],tiles[random]];
    }

    draw();
   }

function isSolved(){
    return tiles.every((v,i)=>v===i);
}
function showLeaderboard(){

    leaderboard.sort((a,b)=>b.score-a.score);

    let html = "";

    leaderboard.forEach((player,index)=>{
        html += `<p>🏆 ${index+1}. ${player.name} - ${player.score} Points</p>`;
    });

    if(html === ""){
        html = "<p>अजून कोणी खेळलेले नाही.</p>";
    }

    document.getElementById("leaderboard").innerHTML = html;
}
shuffle();
  showLeaderboard();
</script>

</body>
</html>
