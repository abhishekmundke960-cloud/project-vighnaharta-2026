<!DOCTYPE html>

<head>

<title>Ganpati Puzzle</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#fff8e7;

h1{

}

#puzzle{
width:300px;
height:300px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);

}

.tile{
border:1px solid #fff;
background-image:url('ganpati.jpg');
background-size:300px 300px;
cursor:pointer;
}

.empty{
background:none;
background:#ddd;
}

button{
padding:12px 20px;
font-size:18px;
background:#ff6b00;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:15px;
}
</style>
</head>
